<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taiyuan | Welcome</title>
  <style>
    :root {
      --bg: #F5F1E8;
      --primary: #3E5C5A;
      --secondary: #7FA58A;
      --accent: #A65A3A;
      --mist: #DCE7E4;
      --text: #2F2F2F;
      --white: #ffffff;
      --shadow: 0 18px 48px rgba(47, 47, 47, 0.18);
      --border: rgba(245, 241, 232, 0.55);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: "Georgia", "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
    }

    .landing {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      isolation: isolate;
    }

    .landing img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -3;
    }

    .landing::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(28, 25, 23, 0.48), rgba(28, 25, 23, 0.62)),
        linear-gradient(120deg, rgba(62, 92, 90, 0.18), rgba(166, 90, 58, 0.18));
      z-index: -2;
    }

    .landing::after {
      content: "";
      position: absolute;
      inset: 22px;
      border: 1px solid rgba(245, 241, 232, 0.32);
      z-index: -1;
      pointer-events: none;
    }

    .panel {
      width: min(88vw, 760px);
      padding: clamp(2rem, 4vw, 4rem);
      border: 1px solid var(--border);
      background: rgba(32, 29, 26, 0.48);
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
      text-align: center;
      color: var(--white);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 1rem;
      padding: 0.45rem 0.9rem;
      border: 1px solid rgba(245, 241, 232, 0.45);
      letter-spacing: 0.18em;
      font-size: 0.78rem;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 5rem);
      line-height: 1.04;
      margin-bottom: 1rem;
      letter-spacing: 0.02em;
    }

    .subtitle {
      width: min(100%, 540px);
      margin: 0 auto 1.9rem;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      font-size: clamp(1rem, 2vw, 1.15rem);
      line-height: 1.8;
      color: rgba(255, 250, 245, 0.92);
    }

    .cta {
      display: inline-block;
      padding: 0.95rem 2rem;
      border: 1px solid rgba(245, 241, 232, 0.55);
      background: var(--accent);
      color: var(--white);
      text-decoration: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease;
    }

    .cta:hover,
    .cta:focus-visible {
      background: #8f4b31;
      border-color: rgba(255, 255, 255, 0.88);
      transform: translateY(-2px);
    }

    .hint {
      margin-top: 1rem;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      color: rgba(255, 245, 238, 0.86);
    }

    @media (max-width: 768px) {
      .landing::after {
        inset: 14px;
      }

      .panel {
        width: min(92vw, 760px);
        padding: 2rem 1.4rem;
      }

      .subtitle {
        line-height: 1.7;
      }

      .cta {
        width: 100%;
        max-width: 280px;
      }
    }
  </style>
</head>
<body>
  <main class="landing">
    <img
      src="images/1.jpg"
      alt="A cinematic evening view of Taiyuan showing traditional rooflines in the foreground and a softly glowing urban skyline in the distance, creating an ancient-city atmosphere for the welcome page."
    >

    <section class="panel" aria-label="Welcome panel">
      <p class="eyebrow">Discover Shanxi</p>
      <h1>Taiyuan</h1>
      <p class="subtitle">
        A city of temple shadows, river light, northern flavors, and stories that have lasted for centuries.
        Step through the gate and explore the cultural heart of Shanxi.
      </p>
      <a class="cta" href="taiyuan.html">Enter the City</a>
      <p class="hint"></p>
    </section>
  </main>
</body>
</html>
